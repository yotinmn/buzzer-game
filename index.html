<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buzzer - Player</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; text-align: center; background: #2c3e50; color: white; padding: 20px; margin: 0;}
    .hidden { display: none !important; }
    input { padding: 12px; font-size: 16px; margin: 10px; border-radius: 8px; border: none; width: 80%; max-width: 300px; text-align: center; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; margin: 5px; }
    
    .btn-join { background: #3498db; color: white; width: 80%; max-width: 300px; margin-top: 10px;}
    .btn-buzz { background: #e74c3c; color: white; font-size: 50px; width: 250px; height: 250px; border-radius: 50%; box-shadow: 0 12px #c0392b; transition: 0.1s; margin-top: 40px; }
    .btn-buzz:active { transform: translateY(12px); box-shadow: 0 0 transparent; }
    .btn-buzz:disabled { background: #7f8c8d; box-shadow: 0 12px #bdc3c7; cursor: not-allowed; }
    
    .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
    #playerStatus { font-size: 1.5rem; margin-top: 30px; font-weight: bold; }
  </style>
</head>
<body>

  <div id="loginScreen" class="container">
    <h1>🔴 เข้าสู่ห้องแข่งขัน</h1>
    <input type="text" id="playerName" placeholder="พิมพ์ชื่อของคุณ">
    <input type="text" id="roomName" placeholder="รหัสห้อง (เช่น room1)" value="room1">
    <button class="btn-join" onclick="joinGame()">เข้าเล่นเกม</button>
  </div>

  <div id="playerScreen" class="container hidden">
    <h2>ห้อง: <span id="p-room" style="color:#f39c12;"></span></h2>
    <h3>ชื่อของคุณ: <span id="p-name"></span></h3>
    <button id="buzzBtn" class="btn-buzz" onclick="hitBuzzer()" disabled>BUZZ!</button>
    <div id="playerStatus">กำลังโหลดสถานะ...</div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDE0wHnqyKzRiujGGBrMKzxXGPfcM_IzJQ",
      authDomain: "yolobuzz-mathspsm.firebaseapp.com",
      databaseURL: "https://yolobuzz-mathspsm-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "yolobuzz-mathspsm",
      storageBucket: "yolobuzz-mathspsm.firebasestorage.app",
      messagingSenderId: "1054193668958",
      appId: "1:1054193668958:web:4c9a6b99a74df19e75f5cf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let myName = "", myRoom = "", roomRef = null;
    let isSubmitting = false; // ป้องกันการกดเบิ้ล

    function joinGame() {
      myName = document.getElementById('playerName').value.trim();
      myRoom = document.getElementById('roomName').value.trim();
      if(!myName || !myRoom) return alert("กรุณาใส่ชื่อและรหัสห้อง");

      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('playerScreen').classList.remove('hidden');
      document.getElementById('p-room').innerText = myRoom;
      document.getElementById('p-name').innerText = myName;

      roomRef = db.ref('buzzer_rooms/' + myRoom);
      
      roomRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const isBuzzerOpen = data.isOpen || false;
        const clicks = data.clicks || {};
        
        const btn = document.getElementById('buzzBtn');
        const status = document.getElementById('playerStatus');

        // จัดเรียงคิวทั้งหมด
        const clickArray = [];
        for (let key in clicks) {
          clickArray.push({ id: key, name: clicks[key].name });
        }
        clickArray.sort((a, b) => a.id.localeCompare(b.id));

        // หาว่าเราอยู่อันดับที่เท่าไหร่ (-1 คือยังไม่ได้กด)
        const myIndex = clickArray.findIndex(p => p.name === myName);

        if (myIndex !== -1) {
          // ถ้าเรากดไปแล้ว
          btn.disabled = true;
          const rank = myIndex + 1;
          if (rank <= 5) {
            status.innerText = `🎉 คุณกดได้อันดับที่ ${rank}!`;
            status.style.color = "#f1c40f";
          } else {
            status.innerText = `❌ ไม่ทัน 5 อันดับแรก (คุณได้ที่ ${rank})`;
            status.style.color = "#e74c3c";
          }
        } else if (!isBuzzerOpen) {
          // ถ้ายังไม่ได้กด และห้องล็อก
          btn.disabled = true;
          status.innerText = "🔒 Host ล็อกห้องอยู่ (รอคำถามจบ)";
          status.style.color = "#95a5a6";
        } else {
          // ถ้าห้องเปิด และยังไม่ได้กด
          btn.disabled = false;
          status.innerText = "🟢 พร้อม! กดเลย!";
          status.style.color = "#2ecc71";
        }
      });
    }

    function hitBuzzer() {
      if (isSubmitting) return;
      isSubmitting = true;
      document.getElementById('buzzBtn').disabled = true; 
      
      // ดันชื่อตัวเองเข้าคิว
      roomRef.child('clicks').push({
        name: myName,
        time: firebase.database.ServerValue.TIMESTAMP
      }).then(() => {
        isSubmitting = false;
      }).catch((err) => {
        isSubmitting = false;
        alert("กดไม่สำเร็จ ลองใหม่อีกครั้ง");
      });
    }
  </script>
</body>
</html>
