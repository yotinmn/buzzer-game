<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buzzer - Host Controller</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; text-align: center; background: #1a1a2e; color: white; padding: 20px; margin: 0;}
    .hidden { display: none !important; }
    input { padding: 12px; font-size: 16px; margin: 10px; border-radius: 8px; border: none; width: 80%; max-width: 300px; text-align: center; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; margin: 5px; }
    
    .btn-host { background: #e67e22; color: white; width: 80%; max-width: 300px; margin-top: 10px;}
    .btn-reset { background: #95a5a6; color: #2c3e50; font-size: 20px; width: 80%; max-width: 300px; margin-top: 30px; transition: 0.2s;}
    .btn-reset:active { transform: scale(0.95); }
    
    .btn-toggle { font-size: 22px; width: 80%; max-width: 300px; margin-top: 20px; transition: 0.2s; padding: 20px;}
    .btn-toggle:active { transform: scale(0.95); }
    
    .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
    
    /* กล่องแสดงรายชื่อ 5 อันดับ */
    #winnerList {
      font-size: 2rem; color: #f1c40f; text-align: left; 
      background: rgba(0,0,0,0.3); padding: 20px 40px 20px 60px; 
      border-radius: 12px; margin: 20px auto; min-width: 250px;
    }
    #winnerList li { margin-bottom: 10px; }
    .empty-list { color: #bdc3c7; font-size: 1.5rem; text-align: center; list-style: none; margin-left: -20px;}

    .host-badge { background: #c0392b; padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-bottom: 20px;}
  </style>
</head>
<body>

  <div id="loginScreen" class="container">
    <div class="host-badge">👑 แผงควบคุมสำหรับ HOST</div>
    <h1>ระบบควบคุมห้อง</h1>
    <input type="text" id="roomName" placeholder="ใส่รหัสห้องที่ต้องการคุม" value="room1">
    <button class="btn-host" onclick="monitorRoom()">เปิดแผงควบคุมห้อง</button>
  </div>

  <div id="hostScreen" class="container hidden">
    <div class="host-badge">👑 แผงควบคุม HOST</div>
    <h2>กำลังคุมห้อง: <span id="h-room" style="color:#f39c12;"></span></h2>
    
    <button id="toggleBtn" class="btn-toggle" onclick="toggleBuzzer()" style="background: #7f8c8d; color: white;">⏳ กำลังโหลด...</button>

    <div style="margin-top: 30px; font-size: 1.2rem; color: #bdc3c7;">ผู้ที่กดปุ่มได้ 5 อันดับแรกคือ:</div>
    
    <ol id="winnerList">
      <li class="empty-list">รอคนกด...</li>
    </ol>
    
    <button id="resetBtn" class="btn-reset" onclick="resetBuzzer()">🔄 ล้างปุ่ม และ ปิดล็อกห้อง</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDE0wHnqyKzRiujGGBrMKzxXGPfcM_IzJQ",
      authDomain: "yolobuzz-mathspsm.firebaseapp.com",
      databaseURL: "https://yolobuzz-mathspsm-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "yolobuzz-mathspsm",
      storageBucket: "yolobuzz-mathspsm.firebasestorage.app",
      messagingSenderId: "1054193668958",
      appId: "1:1054193668958:web:4c9a6b99a74df19e75f5cf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let myRoom = "", roomRef = null;
    let isBuzzerOpen = false;

    function monitorRoom() {
      myRoom = document.getElementById('roomName').value.trim();
      if(!myRoom) return alert("กรุณาใส่รหัสห้อง");

      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('hostScreen').classList.remove('hidden');
      document.getElementById('h-room').innerText = myRoom;

      roomRef = db.ref('buzzer_rooms/' + myRoom);

      roomRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        isBuzzerOpen = data.isOpen || false;
        const clicks = data.clicks || {};
        
        const listEl = document.getElementById('winnerList');
        const toggleBtn = document.getElementById('toggleBtn');

        // แปลงข้อมูลคิวให้เป็น Array แล้วเรียงลำดับตามเวลาที่กดเข้ามา
        const clickArray = [];
        for (let key in clicks) {
          clickArray.push({ id: key, name: clicks[key].name });
        }
        clickArray.sort((a, b) => a.id.localeCompare(b.id)); // เรียงลำดับคิว

        // ตัดเอาแค่ 5 คนแรก
        const top5 = clickArray.slice(0, 5);

        // อัปเดตรายชื่อบนหน้าจอ
        listEl.innerHTML = "";
        if (top5.length > 0) {
          top5.forEach((player) => {
            const li = document.createElement('li');
            li.innerText = player.name;
            listEl.appendChild(li);
          });
        } else {
          listEl.innerHTML = '<li class="empty-list">รอคนกด...</li>';
        }

        // จัดการปุ่มเปิด/ปิด
        if (isBuzzerOpen) {
          toggleBtn.innerText = "🔴 'ปิด' ไม่ให้กด";
          toggleBtn.style.background = "#e74c3c";
        } else {
          toggleBtn.innerText = "🟢 'เปิด' ให้กดได้";
          toggleBtn.style.background = "#2ecc71";
        }
      });
    }

    function toggleBuzzer() {
      if(roomRef) roomRef.update({ isOpen: !isBuzzerOpen });
    }

    function resetBuzzer() {
      if(roomRef) {
        // ล้างข้อมูลคิวผู้ชนะทั้งหมดทิ้ง และล็อกห้อง
        roomRef.update({ clicks: null, isOpen: false }).catch(err => {
          alert("เกิดข้อผิดพลาด: " + err.message);
        });
      }
    }
  </script>
</body>
</html>
